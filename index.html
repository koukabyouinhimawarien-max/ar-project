<script>
const video = document.getElementById("camera");
const frame = document.getElementById("frame");
const shotButton = document.getElementById("shotButton");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const resultImage = document.getElementById("resultImage");
const backButton = document.getElementById("backButton");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" },
  audio: false
})
.then(stream => {
  video.srcObject = stream;
})
.catch(() => {
  alert("カメラを起動できませんでした。カメラ許可を確認してください。");
});

function drawCover(ctx, img, canvasW, canvasH) {
  const imgW = img.videoWidth || img.naturalWidth;
  const imgH = img.videoHeight || img.naturalHeight;

  const scale = Math.max(canvasW / imgW, canvasH / imgH);
  const w = imgW * scale;
  const h = imgH * scale;
  const x = (canvasW - w) / 2;
  const y = (canvasH - h) / 2;

  ctx.drawImage(img, x, y, w, h);
}

function drawContain(ctx, img, canvasW, canvasH) {
  const imgW = img.naturalWidth;
  const imgH = img.naturalHeight;

  const scale = Math.min(canvasW / imgW, canvasH / imgH);
  const w = imgW * scale;
  const h = imgH * scale;
  const x = (canvasW - w) / 2;
  const y = (canvasH - h) / 2;

  ctx.drawImage(img, x, y, w, h);
}

shotButton.addEventListener("click", () => {
  if (!video.videoWidth) return;

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  drawCover(ctx, video, canvas.width, canvas.height);
  drawContain(ctx, frame, canvas.width, canvas.height);

  resultImage.src = canvas.toDataURL("image/png");
  preview.style.display = "block";
});

backButton.addEventListener("click", () => {
  preview.style.display = "none";
});
</script>
