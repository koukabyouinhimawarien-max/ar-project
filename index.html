<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin:0; padding:0; overflow:hidden;
  background:black; width:100%; height:100%;
}

video {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:1;
}

#frame {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:contain;
  z-index:2;
  pointer-events:none;
}

#shotButton {
  position:fixed;
  bottom:30px; left:50%;
  transform:translateX(-50%);
  z-index:3;
  width:82px; height:82px;
  border-radius:50%;
  border:7px solid white;
  background:rgba(255,255,255,0.65);
}

#preview {
  display:none;
  position:fixed; inset:0;
  background:black;
  z-index:10;
  text-align:center;
}

#resultImage {
  max-width:100%;
  max-height:82%;
  margin-top:10px;
}

#message {
  color:white;
  font-size:16px;
  margin:8px;
}

#backButton {
  font-size:18px;
  padding:12px 24px;
  border-radius:12px;
  border:none;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>
<img id="frame" src="frame.png">
<button id="shotButton"></button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="preview">
  <img id="resultImage">
  <div id="message">画像を長押しして保存してください</div>
  <button id="backButton">もう一度撮る</button>
</div>

<script>
const video = document.getElementById("camera");
const frame = document.getElementById("frame");
const shotButton = document.getElementById("shotButton");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const preview = document.getElementById("preview");
const resultImage = document.getElementById("resultImage");
const backButton = document.getElementById("backButton");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" },
  audio: false
})
.then(stream => {
  video.srcObject = stream;
})
.catch(() => {
  alert("カメラを起動できませんでした。カメラ許可を確認してください。");
});

function drawCover(ctx, img, canvasW, canvasH) {
  const imgW = img.videoWidth || img.naturalWidth;
  const imgH = img.videoHeight || img.naturalHeight;

  const scale = Math.max(canvasW / imgW, canvasH / imgH);
  const w = imgW * scale;
  const h = imgH * scale;
  const x = (canvasW - w) / 2;
  const y = (canvasH - h) / 2;

  ctx.drawImage(img, x, y, w, h);
}

function drawContain(ctx, img, canvasW, canvasH) {
  const imgW = img.naturalWidth;
  const imgH = img.naturalHeight;

  const scale = Math.min(canvasW / imgW, canvasH / imgH);
  const w = imgW * scale;
  const h = imgH * scale;
  const x = (canvasW - w) / 2;
  const y = (canvasH - h) / 2;

  ctx.drawImage(img, x, y, w, h);
}

shotButton.addEventListener("click", () => {
  if (!video.videoWidth) return;

  const videoRatio = video.videoWidth / video.videoHeight;
const screenRatio = window.innerWidth / window.innerHeight;

if (screenRatio > videoRatio) {
  canvas.height = window.innerHeight;
  canvas.width = canvas.height * videoRatio;
} else {
  canvas.width = window.innerWidth;
  canvas.height = canvas.width / videoRatio;
}

  drawCover(ctx, video, canvas.width, canvas.height);
  drawContain(ctx, frame, canvas.width, canvas.height);

  resultImage.src = canvas.toDataURL("image/png");
  preview.style.display = "block";
});

backButton.addEventListener("click", () => {
  preview.style.display = "none";
});
</script>

</body>
</html>
