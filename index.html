<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin:0; padding:0; overflow:hidden; background:black; }
video { position:fixed; width:100%; height:100%; object-fit:cover; z-index:1; }
#frame { position:fixed; width:100%; height:100%; object-fit:contain; z-index:2; pointer-events:none; }

#shotButton {
  position:fixed; bottom:30px; left:50%; transform:translateX(-50%);
  z-index:3; width:80px; height:80px;
  border-radius:50%; border:6px solid white;
  background:rgba(255,255,255,0.7);
}

#saveBtn {
  position:fixed; bottom:120px; left:50%; transform:translateX(-50%);
  z-index:4; padding:12px 20px;
  font-size:16px; border-radius:10px; border:none;
  display:none;
}

#resultImage {
  position:fixed;
  top:10px; left:10px;
  width:120px;
  border:2px solid white;
  z-index:5;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>
<img id="frame" src="frame.png">
<button id="shotButton"></button>
<button id="saveBtn">保存</button>

<canvas id="canvas" style="display:none;"></canvas>
<img id="resultImage">

<script>
const video = document.getElementById("camera");
const frame = document.getElementById("frame");
const shotBtn = document.getElementById("shotButton");
const saveBtn = document.getElementById("saveBtn");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const resultImage = document.getElementById("resultImage");

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" },
  audio: false
})
.then(stream => video.srcObject = stream);

let imageData = "";

shotBtn.addEventListener("click", () => {
  const w = window.innerWidth;
  const h = window.innerHeight;

  canvas.width = w;
  canvas.height = h;

  ctx.drawImage(video, 0, 0, w, h);
  ctx.drawImage(frame, 0, 0, w, h);

  imageData = canvas.toDataURL("image/png");
  resultImage.src = imageData;

  saveBtn.style.display = "block";
});

saveBtn.addEventListener("click", () => {
  const a = document.createElement("a");
  a.href = imageData;
  a.download = "photo.png";
  a.click();
});
</script>

</body>
</html>
