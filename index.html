<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
      width: 100%;
      height: 100%;
    }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      top: 0;
      left: 0;
      z-index: 1;
    }

    #frame {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: contain;
      top: 0;
      left: 0;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>
<img id="frame" src="frame.png">

<script>
  const video = document.getElementById("camera");

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: "environment"
    },
    audio: false
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(error => {
    alert("カメラを起動できませんでした。カメラ許可を確認してください。");
    console.error(error);
  });
</script>

</body>
</html>
